# ─────────────────────────────────────────────────────────────────
# FindEvil Agent — CI/CD Pipeline
# Runs on every push and PR: lint, type-check, unit test, build
# ─────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore: ['docs/**', '*.md', '.gitignore']
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual triggering

env:
  PYTHON_VERSION: "3.11"
  PYTHONUNBUFFERED: 1

jobs:
  # ── Lint & Format Check ────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      - name: Check formatting (Black)
        run: black --check --diff src/ tests/

      - name: Lint with Ruff
        run: ruff check src/ tests/

  # ── Type Check ──────────────────────────────────────────────
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy pydantic
          pip install -e . 2>/dev/null || true

      - name: Run mypy
        run: mypy src/ --ignore-missing-imports --no-strict-optional || true
        continue-on-error: true  # Don't fail CI on type issues (yet)

  # ── Unit Tests ──────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install system dependencies (forensic tools)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            sleuthkit foremost yara tshark binutils
        continue-on-error: true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-timeout
          pip install -e . 2>/dev/null || pip install pydantic fastmcp httpx rich

      - name: Run unit tests
        run: |
          python -m pytest tests/ \
            -v \
            --tb=short \
            -k "not slow" \
            --timeout=60 \
            -x
        env:
          GROQ_API_KEY: ""  # Explicitly empty to test deterministic mode

      - name: Verify deterministic mode works
        run: |
          echo "Testing agent initializes without API key..."
          python3 -c "
          from src.agent.groq_client import GroqDFIRClient
          c = GroqDFIRClient(api_key='')
          assert not c.available, 'Client should not be available without API key'
          assert c.decide_next_tools('test', {}, []) == [], 'Should return empty list'
          report = c.generate_report([], [])
          assert 'DFIR Investigation Report' in report, 'Should generate narrative report'
          print('  ✅ Deterministic mode verified')
          "

  # ── Build & Package ─────────────────────────────────────────
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── Docker Build Check ──────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t findevil-agent --target builder .

      - name: Verify image exists
        run: docker images findevil-agent

  # ── Security Scan (Dependencies) ────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit
        continue-on-error: true
