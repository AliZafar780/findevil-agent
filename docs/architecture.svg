  <!-- FOOTER -->
  <!-- ═══════════════════════════════════════════════ -->

  <line x1="40" y1="735" x2="1240" y2="735" stroke="#334155" stroke-width="1"/>

  <!-- Evidence Sources -->
  <rect x="40" y="750" width="280" height="64" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="180" y="776" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">📦 SUPPORTED EVIDENCE TYPES</text>
  <text x="180" y="798" text-anchor="middle" fill="#64748b" font-size="10">Disk Images · Memory Dumps · PCAPs · Registry Hives</text>

  <!-- Platform Support -->
  <rect x="360" y="750" width="280" height="64" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="500" y="776" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">🌍 PLATFORM SUPPORT</text>
  <text x="500" y="798" text-anchor="middle" fill="#64748b" font-size="10">Linux · macOS · Windows · Cross-Platform</text>

  <!-- Version -->
  <rect x="680" y="750" width="280" height="64" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="820" y="776" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">🚀 VERSION</text>
  <text x="820" y="798" text-anchor="middle" fill="#64748b" font-size="10">v2.1.1 · 96 Passing Tests</text>

  <!-- Groq Badge -->
  <rect x="1000" y="750" width="240" height="64" rx="8" fill="#0f172a" stroke="#f97316" stroke-width="1"/>
  <text x="1120" y="776" text-anchor="middle" fill="#f97316" font-size="11" font-weight="600">⚡ Powered by Groq</text>
  <text x="1120" y="798" text-anchor="middle" fill="#64748b" font-size="10">Llama 3.3 70B · Ultra-low latency</text>

  <!-- Bottom tagline -->
  <text x="640" y="860" text-anchor="middle" fill="#475569" font-size="12" font-weight="500" letter-spacing="1">Find Evil, Find Answers, Find Closure</text>
