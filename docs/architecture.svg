  <text x="485" y="474" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="700">🧩 Phase 3</text>
  <text x="485" y="492" text-anchor="middle" fill="#cbd5e1" font-size="10">Artifact Extraction</text>

  <line x1="555" y1="478" x2="580" y2="478" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 4: Memory -->
  <rect x="580" y="450" width="140" height="56" rx="8" fill="#0f172a" stroke="#ec4899" stroke-width="1"/>
  <text x="650" y="474" text-anchor="middle" fill="#ec4899" font-size="12" font-weight="700">🧠 Phase 4</text>
  <text x="650" y="492" text-anchor="middle" fill="#cbd5e1" font-size="10">Memory Analysis</text>

  <line x1="720" y1="478" x2="745" y2="478" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 5: Registry -->
  <rect x="745" y="450" width="140" height="56" rx="8" fill="#0f172a" stroke="#84cc16" stroke-width="1"/>
  <text x="815" y="474" text-anchor="middle" fill="#84cc16" font-size="12" font-weight="700">🪟 Phase 5</text>
  <text x="815" y="492" text-anchor="middle" fill="#cbd5e1" font-size="10">Registry Analysis</text>

  <line x1="885" y1="478" x2="910" y2="478" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 6: Network -->
  <rect x="910" y="450" width="140" height="56" rx="8" fill="#0f172a" stroke="#06b6d4" stroke-width="1"/>
  <text x="980" y="474" text-anchor="middle" fill="#06b6d4" font-size="12" font-weight="700">📡 Phase 6</text>
  <text x="980" y="492" text-anchor="middle" fill="#cbd5e1" font-size="10">Network Analysis</text>

  <line x1="1050" y1="478" x2="1075" y2="478" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 7: Report -->
  <rect x="1075" y="450" width="120" height="56" rx="8" fill="#0f172a" stroke="#10b981" stroke-width="1"/>
  <text x="1135" y="474" text-anchor="middle" fill="#10b981" font-size="12" font-weight="700">📄 Output</text>
  <text x="1135" y="492" text-anchor="middle" fill="#cbd5e1" font-size="10">AI Report</text>

  <!-- Arrow: Groq → Workflow -->
  <path d="M 640 368 L 640 435" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- LAYER 4: FORENSIC TOOLS -->
  <!-- ═══════════════════════════════════════════════ -->

  <text x="30" y="558" fill="#64748b" font-size="11" font-weight="600" letter-spacing="2" text-transform="uppercase">FORENSIC TOOLS — 21 CAPABILITIES</text>
  <line x1="30" y1="565" x2="260" y2="565" stroke="#334155" stroke-width="1"/>

  <!-- Arrow: Workflow → Tools -->
  <line x1="640" y1="521" x2="640" y2="580" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- TSK Tools -->
  <rect x="40" y="578" width="220" height="130" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1" filter="url(#shadowSm)"/>
  <rect x="40" y="578" width="220" height="28" rx="8" fill="#6366f1" opacity="0.15"/>
  <text x="150" y="596" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="700">SLEUTH KIT (TSK)</text>
  <text x="55" y="620" fill="#94a3b8" font-size="10">📋  fs_list_files</text>
  <text x="55" y="638" fill="#94a3b8" font-size="10">📄  fs_extract_file</text>
  <text x="55" y="656" fill="#94a3b8" font-size="10">ℹ️   fs_file_metadata</text>
  <text x="55" y="674" fill="#94a3b8" font-size="10">💽  fs_filesystem_info</text>
  <text x="55" y="692" fill="#94a3b8" font-size="10">🔍  fs_partition_scan</text>

  <!-- Memory Tools -->
  <rect x="280" y="578" width="220" height="130" rx="8" fill="#1e293b" stroke="#ec4899" stroke-width="1" filter="url(#shadowSm)"/>
  <rect x="280" y="578" width="220" height="28" rx="8" fill="#ec4899" opacity="0.15"/>
  <text x="390" y="596" text-anchor="middle" fill="#f9a8d4" font-size="11" font-weight="700">MEMORY FORENSICS</text>
  <text x="295" y="620" fill="#94a3b8" font-size="10">🧠  mem_analyze</text>
  <text x="295" y="638" fill="#94a3b8" font-size="10">⚙️   mem_list_processes</text>
  <text x="295" y="656" fill="#94a3b8" font-size="10">🌐  mem_scan_network</text>
  <text x="295" y="674" fill="#94a3b8" font-size="10">📝  mem_dump_cmdline</text>

  <!-- Registry + YARA + Carving -->
  <rect x="520" y="578" width="220" height="130" rx="8" fill="#1e293b" stroke="#84cc16" stroke-width="1" filter="url(#shadowSm)"/>
  <rect x="520" y="578" width="220" height="28" rx="8" fill="#84cc16" opacity="0.15"/>
  <text x="630" y="596" text-anchor="middle" fill="#bef264" font-size="11" font-weight="700">REGISTRY &amp; PATTERNS</text>
  <text x="535" y="620" fill="#94a3b8" font-size="10">🪟  reg_analyze_hive</text>
  <text x="535" y="638" fill="#94a3b8" font-size="10">🧬  scan_yara</text>
  <text x="535" y="656" fill="#94a3b8" font-size="10">🧩  carve_files</text>
  <text x="535" y="674" fill="#94a3b8" font-size="10">🔐  verify_hash</text>
  <text x="535" y="692" fill="#94a3b8" font-size="10">📋  list_evidence</text>

  <!-- Network + Timeline -->
  <rect x="760" y="578" width="220" height="130" rx="8" fill="#1e293b" stroke="#06b6d4" stroke-width="1" filter="url(#shadowSm)"/>
  <rect x="760" y="578" width="220" height="28" rx="8" fill="#06b6d4" opacity="0.15"/>
  <text x="870" y="596" text-anchor="middle" fill="#67e8f9" font-size="11" font-weight="700">NETWORK &amp; TIMELINE</text>
  <text x="775" y="620" fill="#94a3b8" font-size="10">📡  pcap_analyze</text>
  <text x="775" y="638" fill="#94a3b8" font-size="10">🔢  pcap_list_protocols</text>
  <text x="775" y="656" fill="#94a3b8" font-size="10">📅  timeline_build</text>
  <text x="775" y="674" fill="#94a3b8" font-size="10">⏱️   timeline_filter</text>
  <text x="775" y="692" fill="#94a3b8" font-size="10">🔎  extract_features</text>

  <!-- Audit + Benchmark -->
  <rect x="1000" y="578" width="240" height="130" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1" filter="url(#shadowSm)"/>
  <rect x="1000" y="578" width="240" height="28" rx="8" fill="#f59e0b" opacity="0.15"/>
  <text x="1120" y="596" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="700">QUALITY &amp; AUDIT</text>
  <text x="1015" y="620" fill="#94a3b8" font-size="10">🎯  benchmark_accuracy</text>
  <text x="1015" y="638" fill="#94a3b8" font-size="10">📊  get_audit_logs</text>
  <text x="1015" y="656" fill="#94a3b8" font-size="10">🧪  create-test-image</text>
  <text x="1015" y="674" fill="#94a3b8" font-size="10">🔧  tool single-run</text>

