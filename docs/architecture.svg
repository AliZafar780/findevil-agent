><ns0:rect x="290" y="320" width="140" height="70" fill="#E0F7FA" stroke="#999" rx="6" /><ns0:text x="360" y="338" font-size="10" font-weight="bold" fill="#333" text-anchor="middle">Carving Tools</ns0:text><ns0:text x="360" y="353" font-size="9" font-weight="normal" fill="#555" text-anchor="middle">carve_files</ns0:text><ns0:text x="360" y="365" font-size="9" font-weight="normal" fill="#555" text-anchor="middle">scan_yara</ns0:text><ns0:line x1="450" y1="380" x2="450" y2="420" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" /><ns0:rect x="200" y="420" width="500" height="80" fill="#2E7D32" stroke="#1B5E20" rx="6" /><ns0:text x="450" y="450" font-size="16" font-weight="bold" fill="white" text-anchor="middle">SIFT Workstation</ns0:text><ns0:text x="450" y="470" font-size="11" font-weight="normal" fill="#c8e6c9" text-anchor="middle">200+ forensic tools: TSK, Volatility 3, YARA, foremost, tshark, ...</ns0:text><ns0:line x1="450" y1="500" x2="450" y2="540" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" /><ns0:rect x="200" y="540" width="220" height="60" fill="#C62828" stroke="#B71C1C" rx="6" /><ns0:text x="310" y="565" font-size="14" font-weight="bold" fill="white" text-anchor="middle">EVIDENCE</ns0:text><ns0:text x="310" y="582" font-size="11" font-weight="normal" fill="#ffcdd2" text-anchor="middle">Read-Only 🔒</ns0:text><ns0:rect x="480" y="540" width="220" height="60" fill="#1565C0" stroke="#0D47A1" rx="6" /><ns0:text x="590" y="565" font-size="14" font-weight="bold" fill="white" text-anchor="middle">RESULTS</ns0:text><ns0:text x="590" y="582" font-size="11" font-weight="normal" fill="#bbdefb" text-anchor="middle">Audit Trail + Carved Files</ns0:text><ns0:text x="450" y="635" font-size="13" font-weight="bold" fill="#333" text-anchor="middle">Security Boundaries</ns0:text><ns0:text x="450" y="655" font-size="11" font-weight="normal" fill="#666" text-anchor="middle">Architectural guardrails enforced at MCP server level — not prompt-based</ns0:te