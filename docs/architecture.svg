  <text x="155" y="474" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="700">🔍 Phase 1</text>
  <text x="155" y="492" text-anchor="middle" fill="#cbd5e1" font-size="10">Initial Triage</text>

  <!-- Arrow -->
  <line x1="225" y1="478" x2="250" y2="478" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 2: FS -->
  <rect x="250" y="450" width="140" height="56" rx="8" fill="#0f172a" stroke="#6366f1" stroke-width="1"/>
  <text x="320" y="474" text-anchor="middle" fill="#6366f1" font-size="12" font-weight="700">📂 Phase 2</text>
  <text x="320" y="492" text-anchor="middle" fill="#cbd5e1" font-size="10">Filesystem Analysis</text>

  <line x1="390" y1="478" x2="415" y2="478" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 3: Artifacts -->
