  <!-- Background -->
  <rect width="1280" height="900" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="1280" y2="0" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="50" x2="1280" y2="50" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="100" x2="1280" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="150" x2="1280" y2="150" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="1280" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="250" x2="1280" y2="250" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="1280" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="350" x2="1280" y2="350" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1280" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="450" x2="1280" y2="450" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="500" x2="1280" y2="500" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="550" x2="1280" y2="550" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="600" x2="1280" y2="600" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="650" x2="1280" y2="650" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="700" x2="1280" y2="700" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="750" x2="1280" y2="750" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="800" x2="1280" y2="800" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="850" x2="1280" y2="850" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Header / Title -->
  <rect x="340" y="20" width="600" height="64" rx="12" fill="url(#headerGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="640" y="60" text-anchor="middle" fill="#fff" font-size="28" font-weight="700" letter-spacing="1">FindEvil — DFIR Agent Architecture</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- LAYER 1: CLI & MCP SERVER -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Layer label -->
  <text x="30" y="125" fill="#64748b" font-size="11" font-weight="600" letter-spacing="2" text-transform="uppercase">INTERFACE LAYER</text>
  <line x1="30" y1="132" x2="200" y2="132" stroke="#334155" stroke-width="1"/>

  <!-- Rich CLI Node -->
  <rect x="80" y="145" width="240" height="68" rx="10" fill="#1e293b" stroke="#14b8a6" stroke-width="1.5" filter="url(#shadowSm)"/>
  <rect x="80" y="145" width="6" height="68" rx="3" fill="#14b8a6"/>
  <text x="100" y="172" fill="#14b8a6" font-size="15" font-weight="700">findevil CLI</text>
  <text x="100" y="192" fill="#94a3b8" font-size="11">Rich terminal UI · 6 commands</text>
  <text x="100" y="206" fill="#64748b" font-size="10">investigate · serve · tools · check</text>

  <!-- MCP Server Node -->
  <rect x="520" y="145" width="240" height="68" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5" filter="url(#shadowSm)"/>
  <rect x="520" y="145" width="6" height="68" rx="3" fill="#10b981"/>
  <text x="540" y="172" fill="#10b981" font-size="15" font-weight="700">MCP Server</text>
  <text x="540" y="192" fill="#94a3b8" font-size="11">Model Context Protocol</text>
  <text x="540" y="206" fill="#64748b" font-size="10">STDIO transport · 21 tools</text>

  <!-- Claude4 / LLM Node -->
  <rect x="960" y="145" width="240" height="68" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadowSm)"/>
  <rect x="960" y="145" width="6" height="68" rx="3" fill="#8b5cf6"/>
  <text x="980" y="172" fill="#8b5cf6" font-size="15" font-weight="700">Claude Code / LLM</text>
  <text x="980" y="192" fill="#94a3b8" font-size="11">Any MCP-compatible agent</text>
  <text x="980" y="206" fill="#64748b" font-size="10">Tool use · autonomous analysis</text>

  <!-- Arrow: CLI → MCP -->
  <line x1="320" y1="179" x2="520" y2="179" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Arrow: MCP → LLM -->
  <line x1="760" y1="179" x2="960" y2="179" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Arrow: CLI direct to tools (bypass) -->
  <path d="M 200 213 L 200 260 L 640 260 L 640 285" stroke="#14b8a6" stroke-width="1" stroke-dasharray="4,3" fill="none" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- LAYER 2: GROQ AI ENGINE -->
  <!-- ═══════════════════════════════════════════════ -->

  <text x="30" y="270" fill="#64748b" font-size="11" font-weight="600" letter-spacing="2" text-transform="uppercase">AI ORCHESTRATION</text>
  <line x1="30" y1="277" x2="200" y2="277" stroke="#334155" stroke-width="1"/>

  <!-- Groq LLM Engine -->
  <rect x="340" y="290" width="600" height="78" rx="12" fill="url(#groqGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="640" y="320" text-anchor="middle" fill="#fff" font-size="17" font-weight="700">🧠 Groq AI Engine (Llama 3.3 70B)</text>
  <text x="640" y="342" text-anchor="middle" fill="#fed7aa" font-size="12">Intelligent tool orchestration · Finding correlation · Narrative report generation</text>
  <text x="640" y="360" text-anchor="middle" fill="#ffedd5" font-size="11" opacity="0.8">Phase management · IOC correlation · Threat scoring · Decision making</text>

  <!-- Arrow: MCP Server → Groq -->
